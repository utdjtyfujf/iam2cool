<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cydia Repository</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ffffff;
            margin-top: 0;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .btn {
            background-color: #007aff;
            color: white;
            padding: 14px 20px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #005bb5;
        }
        .btn-sileo {
            background-color: #333333;
            border: 1px solid #555;
        }
        .btn-sileo:hover {
            background-color: #444444;
        }
        .warning-box {
            background-color: #2c1a1d;
            border-left: 4px solid #ff3b30;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            color: #ffb3b0;
        }
        .warning-box strong {
            color: #ff3b30;
        }
        code {
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #4cd964;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Repo!</h1>
        <p>Grab the tweaks everyone has been asking for directly from the source.</p>

        <div class="btn-container">
            <!-- Add to Zebra Button -->
            <a class="btn" href="sileo://source/https://iam2c00l.github.io/iam2cool/ ">Add to Zebra</a>
            
            <!-- Add to Sileo Button -->
            <a class="btn btn-sileo" href="sileo://source/https://iam2c00l.github.io/iam2cool/ ">Add to Sileo</a>
        </div>

        <p>Or manually add this URL to your package manager:</p>
        <p><code>https://iam2c00l.github.io/iam2cool/</code></p>

        </div>
    </div>

</body>
</html>
