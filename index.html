<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iam2cool's Repo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 1.5rem;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }
        /* Sileo Teal */
        .btn.sileo {
            background-color: #3bb2c1;
        }
        .btn.sileo:hover {
            background-color: #2b8b97;
        }
        /* Zebra Green */
        .btn.zebra {
            background-color: #34c759;
        }
        .btn.zebra:hover {
            background-color: #289e45;
        }
        /* Cydia Brown/Orange */
        .btn.cydia {
            background-color: #8f6e52; 
        }
        .btn.cydia:hover {
            background-color: #70553f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Add to Package Manager</h1>
        <p>Tap a button below to add this repository directly to your package manager.</p>
        
        <div class="button-group">
            <!-- Standard Sileo Scheme -->
            <a href="sileo://source/https://iam2c00l.github.io/iam2cool/" class="btn sileo">Add to Sileo</a>
            
            <!-- Standard Zebra Scheme -->
            <a href="zbra://sources/add/https://iam2c00l.github.io/iam2cool/" class="btn zebra">Add to Zebra</a>
            
            <!-- Standard Cydia Share Scheme -->
            <a href="cydia://url/https://cydia.saurik.com/api/share#?source=https://iam2c00l.github.io/iam2cool/" class="btn cydia">Add to Cydia</a>
        </div>
    </div>

</body>
</html>
